<div style="max-width: 360px; background: var(--panel); border-radius: var(--radius-lg); padding: 22px 24px; border: 1px solid var(--border); box-shadow: 0 12px 32px rgba(0,0,0,0.1);" onclick="event.stopPropagation()">
    <h3 style="margin-bottom: 14px; font-size: 15px; font-weight: 600; color: var(--text);">Add Tag</h3>
    <form hx-post="/highlights/{{ highlight.id }}/tags" hx-target="#highlight-view" hx-swap="outerHTML"
        hx-on::after-request="document.getElementById('tag-modal').style.display='none'">
        <div class="form-group" style="margin-bottom: 14px;">
            <input type="text" name="tag_name" placeholder="Tag name" autofocus required>
        </div>
        <div class="row" style="gap: 8px; justify-content: flex-end;">
            <button type="button" onclick="document.getElementById('tag-modal').style.display='none'"
                class="btn btn--ghost btn--sm">Cancel</button>
            <button type="submit" class="btn btn--ghost btn--sm">Add</button>
        </div>
    </form>
</div>
