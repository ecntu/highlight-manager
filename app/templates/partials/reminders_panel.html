<style>
    #reminders-panel details[open] .reminders-chevron { transform: rotate(180deg); }
    #reminders-panel .reminders-chevron { transition: transform 0.2s; }
</style>
<div id="reminders-panel" style="margin-top: 12px; margin-bottom: 12px;">
    <details {% if keep_open %}open{% endif %}>
        <summary style="list-style: none; cursor: pointer; padding: 0 0 8px 0; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 11.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;">Reminders{% if highlight.reminders %} ({{ highlight.reminders|length }}){% endif %}</span>
            <svg class="reminders-chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--muted-2); flex-shrink: 0;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </summary>
        <div>
            <div style="margin-bottom: 10px;">
                <div class="reminder-controls">
                    <form hx-post="/highlights/{{ highlight.id }}/reminders" hx-target="#reminders-panel" hx-swap="outerHTML">
                        <input type="hidden" name="keep_open" value="1">
                        <div class="reminder-presets">
                            <button type="submit" class="btn btn--ghost btn--sm reminder-preset-btn" name="preset" value="tomorrow">Tomorrow</button>
                            <button type="submit" class="btn btn--ghost btn--sm reminder-preset-btn" name="preset" value="next_week">Next wk</button>
                            <button type="submit" class="btn btn--ghost btn--sm reminder-preset-btn" name="preset" value="next_month">Next mo</button>
                            <button type="submit" class="btn btn--ghost btn--sm reminder-preset-btn" name="preset" value="next_year">Next yr</button>
                        </div>
                    </form>
                    <form hx-post="/highlights/{{ highlight.id }}/reminders" hx-target="#reminders-panel" hx-swap="outerHTML">
                        <input type="hidden" name="keep_open" value="1">
                        <div class="reminder-custom">
                            <input type="date" name="remind_on" required class="reminder-date-input" style="background: var(--panel-subtle);">
                            <button type="submit" class="btn btn--ghost btn--sm">Add date</button>
                        </div>
                    </form>
                </div>
            </div>

            {% if highlight.reminders %}
            <div style="display: grid; gap: 4px;">
                {% for reminder in highlight.reminders %}
                <div id="highlight-reminder-{{ reminder.id }}" style="display: flex; align-items: center; gap: 4px; padding: 2px 0;">
                    <span style="font-size: 13px; color: var(--muted);">{{ reminder.remind_at.strftime('%b %d, %Y') }}</span>
                    <button hx-delete="/highlights/{{ highlight.id }}/reminders/{{ reminder.id }}"
                        hx-target="#reminders-panel" hx-swap="outerHTML" class="icon-btn"
                        title="Mark done" aria-label="Mark reminder done">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </button>
                </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </details>
</div>
