<div id="note-{{ note.id }}">
    <p style="margin: 0 0 5px 0; font-size: 14px; line-height: 1.6; color: var(--muted); white-space: pre-wrap;">{{ note.body }}</p>
    <div class="row-between" style="align-items: center;">
        <span class="muted-2" style="font-size: 12px;">{{ note.updated_at.strftime('%b %Y') }}{% if note.kind %} · {{ note.kind }}{% endif %}</span>
        <div class="row" style="gap: 2px;">
            <button class="icon-btn" hx-get="/notes/{{ note.id }}/edit" hx-target="#note-{{ note.id }}" hx-swap="outerHTML" title="Edit">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z" />
                </svg>
            </button>
            <button class="icon-btn danger" hx-delete="/notes/{{ note.id }}"
                hx-target="{% if note.highlight_id %}#highlight-notes{% else %}#source-notes{% endif %}" hx-swap="outerHTML"
                hx-confirm="Delete this note?" title="Delete">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
            </button>
        </div>
    </div>
</div>
