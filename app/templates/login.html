{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="width: 100%; max-width: 340px;">
        <div style="text-align: center; margin-bottom: 28px;">
            <a href="/" style="font-family: var(--font-serif); font-size: 28px; font-weight: 400; color: var(--text); text-decoration: none; letter-spacing: -0.02em;">hl.</a>
            <p class="muted-2" style="margin-top: 8px; font-size: 13.5px;">Your personal highlight library</p>
        </div>

        <div class="card">
            <form method="post" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                {% if error %}
                <div class="error" style="margin-bottom: 10px;">{{ error }}</div>
                {% endif %}
                <div class="form-actions" style="margin-top: 6px;">
                    <button type="submit" class="btn btn--ghost" style="width: 100%; justify-content: center;">Sign in</button>
                </div>
            </form>
        </div>

        <p style="text-align: center; margin-top: 16px; font-size: 13.5px; color: var(--muted-2);">
            No account? <a href="/register" style="color: var(--accent); text-decoration: none;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
