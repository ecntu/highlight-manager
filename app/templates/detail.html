{% extends "base.html" %}

{% block title %}Highlight{% endblock %}

{% block content %}
{% include 'partials/highlight_card.html' %}

{% include 'partials/reminders_panel.html' %}

<!-- Collection Picker Modal -->
<div id="collection-modal"
    style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;"
    onclick="if(event.target === this) this.style.display='none'">
    <div style="max-width: 400px; width: 90%; background: var(--panel); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.12);"
        onclick="event.stopPropagation()">
        <h3 style="margin-bottom: 18px; font-size: 16px; font-weight: 600; color: var(--text);">Add to Collection</h3>
        <div id="collection-list" style="max-height: 380px; overflow-y: auto;">Loading...</div>
    </div>
</div>

<!-- Tag Add Modal -->
<div id="tag-modal"
    style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;"
    onclick="if(event.target === this) this.style.display='none'"></div>

<script>
    function showAddToCollection() {
        const modal = document.getElementById('collection-modal');
        modal.style.display = 'flex';
        const container = document.getElementById('collection-list');

        fetch('/collections')
            .then(r => r.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const currentCollections = [{% for c in highlight.collections %}'{{ c.id }}'{% if not loop.last %}, {% endif %}{% endfor %}];
                const highlightId = '{{ highlight.id }}';

                const allCollections = doc.querySelectorAll('[data-collection-id]');
                if (allCollections.length === 0) {
                    container.innerHTML = '<p style="color: var(--muted); font-size: 14px;">No collections yet. <a href="/collections" style="color: var(--accent); text-decoration: none; font-weight: 500;">Create one</a>.</p>';
                } else {
                    let buttons = '';
                    allCollections.forEach(col => {
                        const collectionId = col.dataset.collectionId;
                        const collectionName = col.dataset.collectionName || col.querySelector('h3')?.textContent?.trim() || 'Untitled';
                        const isIn = currentCollections.includes(collectionId);
                        buttons += `<button onclick="addToCollection('${collectionId}', '${highlightId}')" class="modal-btn" ${isIn ? 'disabled' : ''}>${isIn ? '<span style="color: var(--success); margin-right: 6px;">✓</span>' : ''}${collectionName}</button>`;
                    });
                    container.innerHTML = buttons;
                }
            })
            .catch(() => {
                container.innerHTML = '<p style="color: var(--muted); font-size: 14px;">Unable to load collections.</p>';
            });
    }

    function addToCollection(collectionId, highlightId) {
        fetch(`/collections/${collectionId}/highlights/${highlightId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        }).then(() => window.location.reload());
    }
</script>
{% endblock %}
